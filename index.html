<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WebNovel Income Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --primary: rgb(196, 10, 10);
      --bg: rgb(147, 25, 25);
      --card: #fff;
      --text: #222;
      --shadow: rgba(20, 1, 56, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, rgb(40, 48, 96), #fff);
      padding: 1.5rem;
      margin: 0;
      color: var(--text);
    }

    header h1 {
      text-align: center;
      color: var(--primary);
      font-size: 2rem;
      margin-bottom: 2rem;
    }

    form {
      background: var(--card);
      padding: 2rem;
      border-radius: 12px;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 0 14px var(--shadow);
    }

    label {
      font-weight: 600;
      margin-top: 1rem;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 0.7rem;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }

    button {
      margin-top: 1.5rem;
      width: 100%;
      background-color: var(--primary);
      color: white;
      padding: 0.9rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .result {
      background: #fff;
      margin: 2rem auto;
      max-width: 600px;
      padding: 1.5rem;
      border-left: 5px solid #28a745;
      border-radius: 12px;
      box-shadow: 0 0 10px var(--shadow);
    }

    .result h2 {
      color: #28a745;
      margin-bottom: 1rem;
    }

    ul {
      list-style: none;
      padding-left: 0;
    }

    .list-group-item {
      padding: 0.8rem;
      border-bottom: 1px solid #eee;
    }

    .bg-light {
      background: rgb(166, 182, 231);
      font-weight: bold;
    }

    @media (max-width: 480px) {
      form, .result {
        padding: 1rem;
      }

      input, select, button {
        font-size: 0.95rem;
        padding: 0.6rem;
      }

      .list-group-item {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>WebNovel Income Calculator</h1>
  </header>

  <main>
    <form id="incomeForm">
      <label>Average Word Count:</label>
      <input type="number" name="word_count" id="word_count" required min="1000" max="2800">

      <label>Total Subscriptions:</label>
      <input type="number" name="subscribers" id="subscribers" required>

      <label>Total Privilege Coins:</label>
      <input type="number" name="privilege_coins" id="privilege_coins" required>

      <label>MGS Bonus Achieved?</label>
      <select name="mgs" id="mgs">
        <option value="no">No</option>
        <option value="yes">Yes</option>
      </select>

      <label>Win Win Tier:</label>
      <select name="winwin" id="winwin">
        <option value="">None</option>
        <option value="tier1">Tier 1 ($50)</option>
        <option value="tier2">Tier 2 ($200)</option>
        <option value="tier3">Tier 3 ($400)</option>
      </select>

      <button type="submit">Calculate</button>
    </form>

    <div class="result" id="result" style="display: none;">
      <h2>📊 Estimated Income: <span id="total_income"></span></h2>
      <p><em>(Estimated only — may vary 5–20%)</em></p>
      <ul>
        <li class="list-group-item"><strong>✍️ Word Count:</strong> <span id="res_word_count"></span></li>
        <li class="list-group-item"><strong>👥 Subscriptions:</strong> <span id="res_subscribers"></span></li>
        <li class="list-group-item"><strong>💰 Final Sub Income:</strong> $<span id="res_final_sub"></span></li>
        <li class="list-group-item"><strong>💎 Privilege Coin Income:</strong> $<span id="res_privilege_income"></span></li>
        <li class="list-group-item"><strong>✅ MGS Bonus:</strong> $<span id="res_mgs"></span></li>
        <li class="list-group-item"><strong>🏆 Win Win Bonus:</strong> $<span id="res_winwin"></span></li>
        <li class="list-group-item bg-light"><strong>📈 Total Estimated Income:</strong> $<span id="res_total"></span></li>
      </ul>
    </div>
  </main>

  <script>
    function calculateIncome(wordCount, subscribers, privilegeCoins, mgs, winwinTier) {
      let coinPrice, coinValue;
      if (wordCount >= 1000 && wordCount <= 1200) {
          coinPrice = 10; coinValue = 0.005000;
      } else if (wordCount <= 1400) {
          coinPrice = 12; coinValue = 0.005000;
      } else if (wordCount <= 1600) {
          coinPrice = 13; coinValue = 0.004615;
      } else if (wordCount <= 1800) {
          coinPrice = 15; coinValue = 0.004444;
      } else if (wordCount <= 2000) {
          coinPrice = 16; coinValue = 0.0046875;
      } else if (wordCount <= 2200) {
          coinPrice = 18; coinValue = 0.004762;
      } else if (wordCount <= 2400) {
          coinPrice = 20; coinValue = 0.0042857;
      } else if (wordCount <= 2600) {
          coinPrice = 21; coinValue = 0.00408163;
      } else {
          coinPrice = 23; coinValue = 0.004347826;
      }


      const rawSub = coinPrice * coinValue * subscribers;
      const finalSub = rawSub > 200 ? rawSub : rawSub * 0.9;
      const privilegeIncome = privilegeCoins * 0.008;

      let winWinIncome = 0;
      if (winwinTier === 'tier1') winWinIncome = 50;
      else if (winwinTier === 'tier2') winWinIncome = 200;
      else if (winwinTier === 'tier3') winWinIncome = 400;

      let mgsIncome = 0;
      if (mgs === 'yes') {
        if (finalSub > 60 && finalSub <= 200) return [200 + winWinIncome, finalSub, privilegeIncome, 0, winWinIncome];
        else mgsIncome = 200;
      }

      const total = finalSub + privilegeIncome + mgsIncome + winWinIncome;
      return [total, finalSub, privilegeIncome, mgsIncome, winWinIncome];
    }

    document.getElementById("incomeForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const wordCount = parseInt(document.getElementById("word_count").value);
      const subscribers = parseInt(document.getElementById("subscribers").value);
      const privilegeCoins = parseInt(document.getElementById("privilege_coins").value);
      const mgs = document.getElementById("mgs").value;
      const winwin = document.getElementById("winwin").value;

      const [income, finalSub, privilegeIncome, mgsIncome, winWinIncome] =
        calculateIncome(wordCount, subscribers, privilegeCoins, mgs, winwin);

      document.getElementById("total_income").textContent = `$${income.toFixed(2)}`;
      document.getElementById("res_word_count").textContent = wordCount;
      document.getElementById("res_subscribers").textContent = subscribers;
      document.getElementById("res_final_sub").textContent = finalSub.toFixed(2);
      document.getElementById("res_privilege_income").textContent = privilegeIncome.toFixed(2);
      document.getElementById("res_mgs").textContent = mgsIncome.toFixed(2);
      document.getElementById("res_winwin").textContent = winWinIncome.toFixed(2);
      document.getElementById("res_total").textContent = income.toFixed(2);

      document.getElementById("result").style.display = "block";
    });
  </script>
</body>
</html>
